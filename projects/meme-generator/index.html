<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator - Thuto Seroto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Impact&family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header class="header">
        <h1>🎭 Meme Generator</h1>
        <p>Upload an image and add your own text to create custom memes</p>
    </header>

    <div class="generator-grid">
        <!-- Controls Section -->
        <div class="controls-section">
            <div class="control-group">
                <label for="imageUpload" class="upload-btn">
                    📁 Upload Image
                </label>
                <input type="file" id="imageUpload" accept="image/*" hidden>
            </div>

            <div class="control-group">
                <label for="topText">Top Text:</label>
                <input type="text" id="topText" placeholder="Enter top text" value="WHEN YOU FIND A BUG">
            </div>

            <div class="control-group">
                <label for="bottomText">Bottom Text:</label>
                <input type="text" id="bottomText" placeholder="Enter bottom text" value="AT 2AM">
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label for="textSize">Text Size:</label>
                    <input type="range" id="textSize" min="20" max="80" value="40">
                </div>

                <div class="control-group">
                    <label for="textColor">Color:</label>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label for="strokeColor">Stroke:</label>
                    <input type="color" id="strokeColor" value="#000000">
                </div>

                <div class="control-group">
                    <label for="fontFamily">Font:</label>
                    <select id="fontFamily">
                        <option value="Impact">Impact</option>
                        <option value="Arial">Arial</option>
                        <option value="Helvetica">Helvetica</option>
                        <option value="Comic Sans MS">Comic Sans</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button id="downloadBtn" class="btn-primary">⬇️ Download Meme</button>
                <button id="resetBtn" class="btn-secondary">🔄 Reset</button>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section">
            <div class="meme-container">
                <canvas id="memeCanvas"></canvas>
                <div id="placeholderText" class="placeholder-text">
                    Upload an image to get started
                </div>
            </div>
        </div>
    </div>

    <!-- Sample Templates -->
    <div class="templates-section">
        <h3>🎯 Quick Templates</h3>
        <div class="templates-grid">
            <div class="template-card" data-top="WHEN THE CODE WORKS" data-bottom="FIRST TRY">
                <span>Code Works</span>
            </div>
            <div class="template-card" data-top="ME TRYING TO DEBUG" data-bottom="FOR 3 HOURS">
                <span>Debug Life</span>
            </div>
            <div class="template-card" data-top="MY BRAIN DURING EXAMS" data-bottom="404 NOT FOUND">
                <span>Exam Mode</span>
            </div>
            <div class="template-card" data-top="WHEN I FIX A BUG" data-bottom="CREATE 3 MORE">
                <span>Developer Life</span>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
